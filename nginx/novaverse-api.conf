# NovaVerse API — nginx reverse proxy
#
# Install:
#   sudo cp nginx/novaverse-api.conf /etc/nginx/sites-available/novaverse-api
#   sudo ln -s /etc/nginx/sites-available/novaverse-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d api.novaverse.xyz

upstream novaverse_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.novaverse.xyz;

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    # ── REST API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://novaverse_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for /api/ws/live)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    86400s;  # Long for WebSocket connections

        # Buffer settings
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Health check (no auth required) ──────────────────────
    location = /api/health {
        proxy_pass http://novaverse_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Allow monitoring tools
        access_log off;
    }

    # ── CORS preflight cache ─────────────────────────────────
    # Fastify handles CORS headers, but nginx can cache OPTIONS
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ── Block everything else ────────────────────────────────
    location / {
        return 404;
    }
}

